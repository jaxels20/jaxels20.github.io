<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      data-goatcounter="https://jeppebergaxelsen.goatcounter.com/count"
      data-goatcounter-settings='{"no_onload": true}'
      async
      src="https://gc.zgo.at/count.js"
    ></script>
    <script>
      ;(function (location) {
        if (!location.search.startsWith('?/')) {
          return
        }

        const decodedPath = location.search
          .slice(2)
          .split('&')
          .map((segment) => segment.replace(/~and~/g, '&'))
          .join('?')

        const basePath = location.pathname.replace(/\/$/, '')
        const routePath = decodedPath.startsWith('/') ? decodedPath : `/${decodedPath}`
        const nextUrl = `${basePath}${routePath}${location.hash}`
        window.history.replaceState(null, '', nextUrl)
      })(window.location)
    </script>
    <title>Badminton Intelligence</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
